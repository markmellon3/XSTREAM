<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — XSTREAM MOVIES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(230, 57, 70, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(198, 40, 40, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(20, 20, 28, 1) 0%, #0a0a0f 70%);
            z-index: 0;
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        .bg-shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(230, 57, 70, 0.12);
            top: -100px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .bg-shape-2 {
            width: 300px;
            height: 300px;
            background: rgba(198, 40, 40, 0.08);
            bottom: -80px;
            left: -80px;
            animation: float2 25s ease-in-out infinite;
        }

        .bg-shape-3 {
            width: 200px;
            height: 200px;
            background: rgba(230, 57, 70, 0.06);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float3 18s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 30px) scale(1.1); }
            66% { transform: translate(20px, -20px) scale(0.9); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -20px) scale(1.15); }
            66% { transform: translate(-20px, 30px) scale(0.85); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(230, 57, 70, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230, 57, 70, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .reset-container {
            background: linear-gradient(180deg, rgba(20, 20, 28, 0.95) 0%, rgba(14, 14, 20, 0.98) 100%);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(230, 57, 70, 0.12);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 60px rgba(230, 57, 70, 0.05);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: cardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .reset-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #e63946, #c62828, transparent);
            border-radius: 0 0 4px 4px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .reset-header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 32px;
        }

        .reset-header .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e63946 0%, #c62828 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        .reset-header .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .reset-header .logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .reset-header .logo-text span {
            color: #e63946;
        }

        .reset-header .icon-wrapper {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.15) 0%, rgba(230, 57, 70, 0.05) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid rgba(230, 57, 70, 0.2);
            position: relative;
        }

        .reset-header .icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(230, 57, 70, 0.08);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.5; }
        }

        .reset-header .icon-wrapper svg {
            width: 30px;
            height: 30px;
            fill: #e63946;
        }

        .reset-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .reset-header p {
            color: #6b6b80;
            font-size: 14px;
            line-height: 1.6;
        }

        .reset-header .email-display {
            font-weight: 600;
            color: #e63946;
            background: rgba(230, 57, 70, 0.1);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        #reset-status {
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.7;
            min-height: 24px;
        }

        #reset-status a {
            color: #e63946;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(230, 57, 70, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(230, 57, 70, 0.2);
            transition: all 0.2s;
        }

        #reset-status a:hover {
            background: rgba(230, 57, 70, 0.2);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9a9ab0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label .required {
            color: #e63946;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #4a4a5e;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #4a4a5e;
        }

        .input-wrapper input:focus {
            border-color: rgba(230, 57, 70, 0.5);
            background: rgba(230, 57, 70, 0.04);
            box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1), 0 0 20px rgba(230, 57, 70, 0.05);
        }

        .input-wrapper input:focus ~ .input-icon {
            color: #e63946;
        }

        .input-wrapper input.input-error {
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.04);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #4a4a5e;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #e63946;
            background: rgba(230, 57, 70, 0.1);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
        }

        .form-error {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
            padding-left: 4px;
        }

        .form-error.visible {
            display: block;
            animation: errorShake 0.4s ease;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .password-strength {
            margin-top: 12px;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s;
            width: 0%;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 6px;
            color: #4a4a5e;
            font-weight: 500;
            transition: color 0.3s;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e63946 0%, #c62828 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.3);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(230, 57, 70, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(230, 57, 70, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .btn-text {
            position: relative;
            z-index: 1;
        }

        .submit-btn .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
            position: relative;
            z-index: 1;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-link a {
            color: #6b6b80;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .back-link a:hover {
            color: #e63946;
            background: rgba(230, 57, 70, 0.08);
        }

        .back-link a svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .back-link a:hover svg {
            transform: translateX(-3px);
        }

        .security-notice {
            margin-top: 20px;
            padding: 14px 16px;
            background: rgba(255, 193, 7, 0.04);
            border: 1px solid rgba(255, 193, 7, 0.1);
            border-radius: 10px;
            border-left: 3px solid #ffc107;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .security-notice .notice-icon {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .security-notice p {
            color: #6b6b80;
            font-size: 12px;
            line-height: 1.5;
        }

        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: toastSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast-success { 
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.95) 0%, rgba(22, 163, 74, 0.95) 100%); 
        }
        .toast-error { 
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.95) 0%, rgba(220, 38, 38, 0.95) 100%); 
        }
        .toast-info { 
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95) 0%, rgba(37, 99, 235, 0.95) 100%); 
        }

        .toast-exit {
            animation: toastSlideOut 0.3s ease forwards;
        }

        @keyframes toastSlideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100px); opacity: 0; }
        }

        .password-requirements {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #4a4a5e;
            transition: color 0.3s;
        }

        .requirement.met {
            color: #22c55e;
        }

        .requirement .check-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid #3a3a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
            font-size: 8px;
        }

        .requirement.met .check-icon {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Loading overlay for form */
        .form-loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.7);
            border-radius: 20px;
            z-index: 10;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .form-loading-overlay.active {
            display: flex;
        }

        .form-loading-overlay .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(230, 57, 70, 0.2);
            border-top-color: #e63946;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .form-loading-overlay .loading-text {
            color: #9a9ab0;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 36px 24px;
                border-radius: 16px;
            }

            .reset-header h1 {
                font-size: 22px;
            }

            .reset-header .logo-text {
                font-size: 18px;
            }

            .password-requirements {
                grid-template-columns: 1fr;
            }

            .toast {
                max-width: calc(100vw - 48px);
            }
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
    <div class="grid-overlay"></div>

    <div id="toast-container"></div>

    <div class="reset-container" style="position:relative;">
        <!-- Loading Overlay -->
        <div class="form-loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <span class="loading-text">Updating password...</span>
        </div>

        <div class="reset-header">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none"><path d="M13 10l10 6-10 6V10z" fill="#fff"/></svg>
                </div>
                <span class="logo-text">xStream <span>Movies</span></span>
            </a>

            <div class="icon-wrapper">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
                </svg>
            </div>

            <h1>Reset Password</h1>
            <p>Enter your new password for<br><span class="email-display" id="reset-email-display"></span></p>
        </div>

        <div id="reset-status"></div>

        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="new-password">New Password <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="new-password" placeholder="Enter new password" required>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <button type="button" class="toggle-password" data-target="new-password">
                        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <span class="form-error" id="new-password-error"></span>

                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-text" id="strength-text"></span>
                </div>

                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        <span class="check-icon">✓</span>
                        <span>6+ characters</span>
                    </div>
                    <div class="requirement" id="req-upper">
                        <span class="check-icon">✓</span>
                        <span>Uppercase letter</span>
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="check-icon">✓</span>
                        <span>Number</span>
                    </div>
                    <div class="requirement" id="req-special">
                        <span class="check-icon">✓</span>
                        <span>Special character</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <button type="button" class="toggle-password" data-target="confirm-password">
                        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- App Config -->
  <script src="config.js"></script>
<script src="js/app.js"></script>
    
    <!-- Forgot Password Module -->
    <script src="js/FP.js"></script>

    <script>
    // ============================================
    // GLOBAL UI FUNCTIONS (Used by FP.js)
    // ============================================
    
    /**
     * Show toast notification
     */
    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) return;

        var icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };

        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.innerHTML = '<span style="font-weight:700;font-size:16px;">' + (icons[type] || '') + '</span> <span>' + message + '</span>';
        container.appendChild(toast);

        setTimeout(function() {
            toast.classList.add('toast-exit');
            setTimeout(function() {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 300);
        }, 5000);
    }
    
    /**
     * Show field error
     */
    function showFormError(fieldId, message) {
        var errorEl = document.getElementById(fieldId + '-error');
        var field = document.getElementById(fieldId);
        
        if (errorEl) {
            errorEl.textContent = message;
            errorEl.classList.add('visible');
        }
        if (field) {
            field.classList.add('input-error');
        }
    }
    
    /**
     * Clear all form errors
     */
    function clearFormErrors(formPrefix) {
        // Clear error messages
        document.querySelectorAll('.form-error').forEach(function(el) {
            el.textContent = '';
            el.classList.remove('visible');
        });
        
        // Clear input error styles
        document.querySelectorAll('.input-error').forEach(function(el) {
            el.classList.remove('input-error');
        });
    }
    
    /**
     * Set form loading state
     */
    function setFormLoading(formPrefix, isLoading) {
        var overlay = document.getElementById('loading-overlay');
        var submitBtn = document.querySelector('#' + formPrefix + '-form .submit-btn') || 
                        document.querySelector('.submit-btn');
        
        if (overlay) {
            if (isLoading) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }
        
        if (submitBtn) {
            submitBtn.disabled = isLoading;
            var btnText = submitBtn.querySelector('.btn-text');
            if (btnText) {
                if (isLoading) {
                    btnText.innerHTML = '<span class="spinner"></span> Processing...';
                } else {
                    btnText.textContent = 'Reset Password';
                }
            }
        }
    }
    
    // Make functions global for FP.js
    window.showToast = showToast;
    window.showFormError = showFormError;
    window.clearFormErrors = clearFormErrors;
    window.setFormLoading = setFormLoading;

    // ============================================
    // PAGE INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        
        // Initialize FP.js reset page
        ForgotPassword.initResetPage({
            emailjs: {
                serviceId: 'YOUR_EMAILJS_SERVICE_ID',
                templateId: 'YOUR_EMAILJS_TEMPLATE_ID',
                publicKey: 'YOUR_EMAILJS_PUBLIC_KEY'
            }
        });

        // Password strength checker
        var passwordInput = document.getElementById('new-password');
        if (passwordInput) {
            passwordInput.addEventListener('input', handlePasswordInput);
        }

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var targetId = this.getAttribute('data-target');
                var input = document.getElementById(targetId);
                var eyeOpen = this.querySelector('.eye-open');
                var eyeClosed = this.querySelector('.eye-closed');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    if (eyeOpen) eyeOpen.style.display = 'none';
                    if (eyeClosed) eyeClosed.style.display = 'block';
                } else {
                    input.type = 'password';
                    if (eyeOpen) eyeOpen.style.display = 'block';
                    if (eyeClosed) eyeClosed.style.display = 'none';
                }
            });
        });
    });

    // ============================================
    // PASSWORD STRENGTH CHECKER
    // ============================================
    function handlePasswordInput(e) {
        var password = e.target.value;
        var fill = document.getElementById('strength-fill');
        var text = document.getElementById('strength-text');
        
        var checks = {
            length: password.length >= 6,
            upper: /[A-Z]/.test(password),
            number: /[0-9]/.test(password),
            special: /[^A-Za-z0-9]/.test(password)
        };

        Object.keys(checks).forEach(function(key) {
            var el = document.getElementById('req-' + key);
            if (el) {
                if (checks[key]) {
                    el.classList.add('met');
                } else {
                    el.classList.remove('met');
                }
            }
        });

        var strength = Object.values(checks).filter(Boolean).length;
        if (password.length >= 10) strength++;
        if (password.length === 0) strength = 0;

        var configs = {
            0: { label: '', color: 'transparent', width: 0 },
            1: { label: 'Weak', color: '#ef4444', width: 20 },
            2: { label: 'Fair', color: '#f97316', width: 40 },
            3: { label: 'Good', color: '#eab308', width: 60 },
            4: { label: 'Strong', color: '#22c55e', width: 80 },
            5: { label: 'Very Strong', color: '#10b981', width: 100 }
        };

        var config = configs[strength] || configs[0];
        fill.style.width = config.width + '%';
        fill.style.background = config.color;
        text.textContent = config.label;
        text.style.color = config.color;
    }
    </script>
</body>
