<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      var DESKTOP_W = 1280;
      var PHONE_MAX = 768;
      var vps = document.querySelectorAll('meta[name="viewport"]');
      var vp = vps[0];
      for (var i = 1; i < vps.length; i++) vps[i].remove();
      if (screen.width >= PHONE_MAX) {
        vp.setAttribute('content', 'width=device-width, initial-scale=1.0');
        return;
      }
      var s = screen.width / DESKTOP_W;
      vp.setAttribute('content', 'width=' + DESKTOP_W + ',initial-scale=' + s);
      window.addEventListener('resize', function() {
        if (screen.width >= PHONE_MAX) {
          vp.setAttribute('content', 'width=device-width, initial-scale=1.0');
        } else {
          var s2 = screen.width / DESKTOP_W;
          vp.setAttribute('content', 'width=' + DESKTOP_W + ',initial-scale=' + s2);
        }
      });
    })();
  </script>
  
  <meta name="description" content="Your xStream profile and activity.">
  <title>My Profile — xStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">

  <div id="toast-container"></div>
  <nav id="main-nav" class="navbar"></nav>

  <!-- Mobile Menu Overlay -->
  <div id="mobile-overlay" class="mobile-overlay"></div>
  <div id="mobile-menu" class="mobile-menu"></div>

  <main class="profile-page">
    <!-- Auth Guard -->
    <div id="profile-auth-guard" style="display:none;" class="auth-guard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <h2>Authentication Required</h2>
      <p>You need to be signed in to view your profile.</p>
      <div class="auth-guard-actions">
        <a href="login.html" class="btn-accent">Sign In</a>
        <a href="signup.html" class="btn-outline">Create Account</a>
      </div>
    </div>

    <!-- Profile Content -->
    <div id="profile-content" style="display:none;">

      <!-- Profile Header Card -->
      <section class="profile-header-section">
        <div class="profile-header-card">
          <div class="profile-cover"></div>
          <div class="profile-header-body">
            <div class="profile-avatar" id="profile-avatar">U</div>
            <div class="profile-header-info">
              <h1 class="profile-name" id="profile-name">Loading...</h1>
              <p class="profile-email" id="profile-email">—</p>
              <div class="profile-meta">
                <span class="profile-meta-item" id="profile-country-badge">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  <span id="profile-country">—</span>
                </span>
                <span class="profile-meta-item" id="profile-age-badge">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                  <span id="profile-age">—</span>
                </span>
                <span class="profile-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                  <span id="profile-joined">—</span>
                </span>
              </div>
            </div>
            <div class="profile-header-actions">
              <button type="button" class="btn-outline" id="sign-out-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- Stats Row -->
      <section class="profile-stats-row">
        <div class="profile-stat-card">
          <div class="profile-stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <div class="profile-stat-info">
            <span class="profile-stat-number" id="stat-favourites">0</span>
            <span class="profile-stat-label">Favourites</span>
          </div>
        </div>
        <div class="profile-stat-card">
          <div class="profile-stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 8 12 3 17 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="profile-stat-info">
            <span class="profile-stat-number" id="stat-downloads">0</span>
            <span class="profile-stat-label">Downloads</span>
          </div>
        </div>
        <div class="profile-stat-card">
          <div class="profile-stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="profile-stat-info">
            <span class="profile-stat-number" id="stat-history">0</span>
            <span class="profile-stat-label">Watched</span>
          </div>
        </div>
      </section>
      
      <!-- Profile Tabs Section -->
      <section class="profile-tabs-section">
        <div class="profile-tabs-header">
          <button class="profile-tab active" data-tab="favourites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Favourites
          </button>
          <button class="profile-tab" data-tab="downloads">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 8 12 3 17 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Downloads
          </button>
          <button class="profile-tab" data-tab="history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Watch History
          </button>
        </div>

        <!-- Favourites Tab Content -->
        <div class="profile-tab-content active" id="tab-favourites">
          <div id="profile-favourites-list" class="widget-video-list">
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
          </div>
        </div>

        <!-- Downloads Tab Content (Fixed duplicate issue here) -->
        <div class="profile-tab-content" id="tab-downloads" style="display:none;">
          <div id="storage-bar-container"></div>
          <div id="profile-downloads-list" class="widget-video-list">
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
          </div>
        </div>

        <!-- History Tab Content -->
        <div class="profile-tab-content" id="tab-history" style="display:none;">
          <div id="profile-history-list" class="widget-video-list">
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
            <div class="skeleton-widget-item"><div class="skeleton skeleton-widget-thumb"></div><div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer id="main-footer" class="footer"></footer>
   <!-- Offline Manager (load after main app.js) -->
 <script src="js/offline-manager.js"></script>
 
 <!-- Register Service Worker -->
 <script>
   if ('serviceWorker' in navigator) {
     window.addEventListener('load', function() {
       navigator.serviceWorker.register('/sw.js').catch(function(err) {
         console.warn('SW registration failed:', err);
       });
     });
   }
 </script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/optimizer.js"></script>
<script src="js/threat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
 <script src="config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
