  <!-- Duplicate-app guard: patches initializeApp so the
       second call (from app.js) silently reuses the first
       app instead of throwing. Must run BEFORE any file
       that calls firebase.initializeApp(). -->
  <script>
    (function () {
      var _orig = firebase.initializeApp;
      firebase.initializeApp = function (opts, name) {
        try {
          return _orig.call(firebase, opts, name);
        } catch (e) {
          if (e.code === 'app/duplicate-app') {
            console.warn('[Firebase] Duplicate init caught — reusing existing app.');
            return firebase.app(name);
          }
          throw e;
        }
      };
    })();
  </script>
